services:
  - type: web
    name: edubridge-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run db:deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:./dev.db
      - key: CORS_ORIGIN
        value: https://edubridge-kaatrs-projects.vercel.app,https://edubridge-ivory.vercel.app,https://edubridge-kaatr0327-kaatrs-projects.vercel.app,https://edubridge-bqie7oduz-kaatrs-projects.vercel.app
